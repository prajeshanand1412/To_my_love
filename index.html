<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Golu ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right,#ffdde1,#ee9ca7);
      padding:20px;
    }

    .card{
      max-width:850px;
      width:100%;
      background:rgba(255,255,255,0.2);
      backdrop-filter:blur(10px);
      padding:40px;
      border-radius:25px;
      text-align:center;
      color:white;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .photo{
      width:280px;
      height:280px;
      object-fit:cover;
      border-radius:20px;
      border:5px solid white;
      margin-bottom:25px;
    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
    }

    p{
      font-size:1.2rem;
      line-height:1.8;
      margin-bottom:30px;
    }

    a{
      text-decoration:none;
    }

    button{
      padding:14px 35px;
      border:none;
      border-radius:30px;
      background:white;
      color:#ff4b7d;
      font-size:1rem;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.08);
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Replace image -->
    <img src="baby.jpeg" class="photo">

    <h1>For My Cutu Golu ❤️</h1>

    <p>
      Dear Golu,

        After clicking the button below, you’ll get two options — “Yes” and “No.”
        You can choose any of them… though I would really love it if you choose “Yes.”
        And if you still want to select “No”… well, you can always try. ❤️

    </p>

    <!-- Separate next page -->
    <a href="index1.html">
      <button>Click Here ❤️</button>
    </a>

  </div>

</body>
</html>
